</head>

<script>
  $(document).ready(function(){
  let scroll = 0;
  const images = [
    "pic1.png",
    "pic2.png",
    "pic3.png",
    "pic4.png",
    "pic5.png"
  ];

  const text = [
    "This character's name is 'Durple'.",
    "This character's name is 'Vineria'.",
    "This character's name is 'Sky'.",
    "This character's name is 'Oren'.",
    "This character's name is 'Mr. Sun'."
    ];

   function showImage() {
    $("#display").html(
      `<img src="${images[scroll]}" width="200" height="200">`
    );
  }

  function showText(){
    $("#text").html(
      `<p>${text[scroll]}</p>`
      );
  }

  showImage();
  showText();

  $("#next").click(function(){
    scroll++;
    if (scroll === images.length) {
      scroll = 0;
    }
    showImage();
    showText();
  });

  $("#back").click(function(){
    scroll--;
    if (scroll < 0) {
      scroll = images.length - 1;
    }
    showImage();
    showText();
  });
}); 
  
</script>
