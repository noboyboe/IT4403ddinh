    $.getJSON(url, function(bookdata) {
      $("#results").empty();

      $.each(bookdata.items, function(index, book) {
        let title = book.volumeInfo.title;
        let thumb = book.volumeInfo.imageLinks?.thumbnail;

        $("#results").append(`
          <div>
            <img src="${thumb}">
            <p> <a href="details.html?id=${book.id}"> ${title} </a> </p>
          </div>
        `);
      });
    });
  } 

$("next").click(function(){

});

</script>
