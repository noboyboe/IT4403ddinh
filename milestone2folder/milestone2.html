<!DOCTYPE html>
<html lang="en">

<head>
  <title>Milestone 2</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="style2.css">
</head>

<body>
  <div class="tabs">
     <button class="tabbut" onclick="window.location.href='https://noboyboe.github.io/IT4403ddinh/milestone2folder/milestone2.html';">Home</button>
      <button class="tabbut" onclick="window.location.href='https://noboyboe.github.io/IT4403ddinh/milestone2folder/mybookshelf.html';">My Bookshelf</button>
  </div>
  

  <div class="header">
    <h1>Google Book Search</h1>
    <p>Search The Catalog</p>
    <input type="text" id="search" placeholder="Find books, ebooks, videos, etc...">
    <button id="searchbutton">Search</button>
  </div>

  <div class="content">
    <div id="results"></div>
    
    <button id="prev">Previous</button>
    <button id="next">Next</button>
  </div>

  <div class="footer">
    <p>Milestone 2 Assignment is ran by Google Books API</p>
  </div>

<script>
  $(document).ready(function() {
    let startIndex = 0;
    let list = "";
    let totalItems = 0;
    const perPage = 20;

    function bookResults() {
      if(!list) return;
      const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(list)}&startIndex=${startIndex}&maxResults=${perPage}`;

      $.getJSON(url)
      .done(function(bookdata) {
        $("#results").empty();
        totalItems = bookdata.totalItems || 0;

        if (!bookdata.items) {
          $("#results").html("<p>No results found</p>");
          return;
        }

        $.each(bookdata.items, function(index,book){
          const title = book.volumeInfo.title || "No Title Found";
          const thumb = book.volumeInfo.imageLinks?.thumbnail || "No Thumbnail Found";

          $("#results").append(`
            <div class="book-item">
              <img src="${thumb}" alt="thumbnail">
              <p><a href="details.html?id=${book.id}">${title}</a></p>
            </div>
          `);
        });
      });
    }
    $("#searchbutton").click(function(){
      list = $("#search").val().trim();
        startIndex = 0;
        bookResults();
    });
  });
    $("#next").click(function(){
      if (startIndex + perPage < totalItems) {
        startIndex += perPage;
        bookResults();
    }
  });
    $("#prev").click(function(){
      if (startIndex - perPage >= 0) {
        startIndex -= perPage;
        bookResults();
      }
    });
</script>
</body>
