<!DOCTYPE html>
<html lang="en">

<head>
  <title>IT4403 Spring 2026 Website</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
      .book {
        border: 1px solid #ccc;
        padding: 15px;
        margin: 15px;
        border-radius: 8px;
      }
      .book img {
        float: center;
        margin-right: 15px;
        width: auto;
        height: auto;
        
      }
  </style>
</head>
<script>
  $(document).ready(function() {
    $.getJSON("google-books-search.json", function(data){
      $.each(data.items, function(index, book) {
      var title = book.volumeInfo.title;
      var web = book.volumeInfo.previewLink;
      var authors = book.volumeInfo.authors;
      var publish = book.volumeInfo.publisher;
      var pub_date = book.volumeInfo.publishedDate;
      var desc = book.volumeInfo.description;
      var thumb = book.volumeInfo.imageLinks?.thumbnail;
      var bookinfo = `
        <div class="book">
          <img src="${thumb}" alt="thumbnail">
          <h2>${title}</h2>
          <p><strong>Author:</strong> ${authors}</p>
          <p><strong>Publisher:</strong> ${publish}</p>
          <p><strong>Published:</strong> ${pub_date}</p>
          <p><strong>Website:</strong> <a href="${web}" target="_blank">Google Books</a></p>
          <p>${desc}</p>
        </div>`;

        $("#list").append(bookinfo);
      });

  });

});
  
</script>

<body>
