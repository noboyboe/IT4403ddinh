<!DOCTYPE html>
<html lang="en">

<head>
  <title>IT4403 Spring 2026 Website</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="google-books-book.json"></script>
</head>

<script>
  $(document).ready(function() {
    $.getJSON("google-books-book.json", function (data) {
      var info = data.volumeInfo;
      
      $("#book-image").attr("src", info.imageLinks.thumbnail);
      $("#title").text(info.title);
      $("#author").text(info.authors);
      $("#publisher").text(info.publisher);
      $("#publishedDate").text(info.publishedDate);
      $("#description").text(info.description);
      $("#website").text(info.WebReaderLink);

    });
  });
      

      
</script>

<body>
  <div class="header">
    <h1>David Dinh</h1>
    <p>Kennesaw State University</p>
    <p>IT4403 - Advanced Web and Mobile Application</p>
  </div>

  <div class="tabs">
    <button class="tabbut" onclick="window.location.href='https://noboyboe.github.io/IT4403ddinh/index.html';">Home</button>
    <button class="tabbut" onclick="window.location.href='https://noboyboe.github.io/IT4403ddinh/exercises.html';">Individual Project Work</button>
    <button class="tabbut" onclick="window.location.href='https://noboyboe.github.io/IT4403ddinh/labs.html';">Lab Work</button>
  </div>

  <div class="content">
    <h1>Single Book Data</h1>

    <img id="book-image">
    <h2 id="title"></h2>
    <p><strong>Author:</strong> <span id="author"></span></p>
    <p><strong>Publisher:</strong> <span id="publisher"></span></p>
    <p><strong>Published:</strong> <span id="publishedDate"></span></p>
    <p id="description"></p> 
  </div>
